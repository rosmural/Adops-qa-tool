<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AdOps QA Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
  :root {
    --bg-base:     #f4f6f9;
    --bg-surface:  #ffffff;
    --bg-card:     #ffffff;
    --bg-raised:   #f8f9fc;
    --bg-input:    #ffffff;
    --border:      #dde1ea;
    --border-soft: #edf0f5;
    --accent:      #2e7d52;
    --accent-lt:   #e8f5ee;
    --accent-dim:  rgba(46,125,82,0.10);
    --text-1:      #111827;
    --text-2:      #374151;
    --text-3:      #6b7280;
    --text-4:      #9ca3af;
    --pass-bg:#edf7f1; --pass-border:#a3d9b8; --pass-text:#1a6b3c; --pass-dot:#2e9e5e;
    --fail-bg:#fef2f2; --fail-border:#fca5a5; --fail-text:#b91c1c; --fail-dot:#dc2626;
    --review-bg:#fffbeb; --review-border:#fcd34d; --review-text:#92400e; --review-dot:#d97706;
    --pending-bg:#f9fafb; --pending-border:#d1d5db; --pending-text:#6b7280; --pending-dot:#9ca3af;
    --del-bg:#fef9c3; --del-color:#713f12; --del-under:#ca8a04;
    --ins-bg:#fee2e2; --ins-color:#991b1b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter','Segoe UI',sans-serif; background:var(--bg-base); color:var(--text-1); min-height:100vh; font-size:14px; }
  input,select { font-family:inherit; outline:none; background:var(--bg-input); color:var(--text-1); border:1.5px solid var(--border); border-radius:7px; }
  input::placeholder { color:var(--text-4); }
  input:focus,select:focus { border-color:var(--accent)!important; box-shadow:0 0 0 3px var(--accent-dim); }
  select option { background:#fff; color:var(--text-1); }
  button { font-family:inherit; cursor:pointer; }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:var(--bg-base); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .fade-in { animation:fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .diff-del { background:var(--del-bg); color:var(--del-color); border-radius:3px; padding:1px 4px; font-weight:700; border-bottom:2px solid var(--del-under); }
  .diff-ins { background:var(--ins-bg); color:var(--ins-color); border-radius:3px; padding:1px 4px; font-weight:700; }
  .card { background:var(--bg-card); border:1.5px solid var(--border); border-radius:12px; overflow:hidden; }
  .label-caps { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); }
</style>
</head>
<body>
<div id="root"></div>
<script>
const{useState,useCallback,useRef,createElement:h}=React;

const DEMO_DATA={"Campaign Name":"Spring Sale Campaign","Deal ID":"201235","Flight Start Date":"03/02/2025","Flight End Date":"03/18/2025","Budget":"$100","IO Signed":"Yes","Wallet Cap":"Nil","Targeting":"US, 25-45, Interests: Fashion","Creative Format":"Display 300x250","Alt Tag":"Spring Sale – Up to 50% Off | Shop Now","Keywords":"spring sale, fashion deals, discount clothing, seasonal offer"};

const QA_FIELDS=[
  {key:"Campaign Name",label:"Campaign Name",type:"text"},
  {key:"Deal ID",label:"Deal ID",type:"text"},
  {key:"Flight Start Date",label:"Flight Start Date",type:"text",placeholder:"MM/DD/YYYY"},
  {key:"Flight End Date",label:"Flight End Date",type:"text",placeholder:"MM/DD/YYYY"},
  {key:"Budget",label:"Budget",type:"text",placeholder:"$0"},
  {key:"IO Signed",label:"IO Signed",type:"select",options:["","Yes","No","Pending"]},
  {key:"Wallet Cap",label:"Wallet Cap",type:"text"},
  {key:"Targeting",label:"Targeting",type:"text"},
  {key:"Creative Format",label:"Creative Format",type:"text"},
  {key:"Alt Tag",label:"Alt Tag",type:"text",placeholder:"Descriptive alt text"},
  {key:"Keywords",label:"Keywords",type:"text",placeholder:"keyword1, keyword2"},
];

const norm=v=>(v??"").toString().trim().toLowerCase().replace(/\s+/g," ");
const compare=(exp,act)=>!act?"pending":norm(exp)===norm(act)?"pass":"fail";

const SC={
  pass:   {label:"PASS",   bg:"var(--pass-bg)",   border:"var(--pass-border)",   text:"var(--pass-text)",   dot:"var(--pass-dot)"},
  fail:   {label:"FAIL",   bg:"var(--fail-bg)",   border:"var(--fail-border)",   text:"var(--fail-text)",   dot:"var(--fail-dot)"},
  review: {label:"REVIEW", bg:"var(--review-bg)", border:"var(--review-border)", text:"var(--review-text)", dot:"var(--review-dot)"},
  pending:{label:"PENDING",bg:"var(--pending-bg)",border:"var(--pending-border)",text:"var(--pending-text)",dot:"var(--pending-dot)"},
};

function tokenise(s){return s.match(/\d+|[a-zA-Z]+|[^a-zA-Z\d\s]|\s+/g)||[];}
function computeDiff(exp,act){
  const a=tokenise(exp),b=tokenise(act),m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>new Int32Array(n+1));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const out=[];let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){out.unshift({text:a[i-1],type:"match"});i--;j--;}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){out.unshift({text:b[j-1],type:"ins"});j--;}
    else{out.unshift({text:a[i-1],type:"del"});i--;}
  }
  return out.reduce((acc,tok)=>{const last=acc[acc.length-1];if(last&&last.type===tok.type){last.text+=tok.text;return acc;}return[...acc,{...tok}];},[]);
}
function DiffExpected({diff}){return h("span",null,...diff.map((tok,i)=>tok.type==="match"?h("span",{key:i},tok.text):tok.type==="del"?h("span",{key:i,className:"diff-del"},tok.text):null));}
function DiffActual({diff}){return h("span",null,...diff.map((tok,i)=>tok.type==="match"?h("span",{key:i},tok.text):tok.type==="ins"?h("span",{key:i,className:"diff-ins"},tok.text):null));}

function DiffLegend(){
  return h("div",{style:{display:"flex",alignItems:"center",gap:14,padding:"9px 16px",background:"#fffbeb",border:"1.5px solid #fcd34d",borderRadius:8,fontSize:12,flexWrap:"wrap",marginBottom:16}},
    h("span",{style:{color:"var(--text-2)",fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase",fontSize:10}},"Diff key:"),
    h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{className:"diff-del"},"abc"),h("span",{style:{color:"var(--text-3)"}},"in CAF/JT, not matched")),
    h("span",{style:{color:"var(--border)"}},"·"),
    h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{className:"diff-ins"},"abc"),h("span",{style:{color:"var(--text-3)"}},"in UI, differs from CAF/JT"))
  );
}

function Step({number,label,active,done}){
  return h("div",{style:{display:"flex",alignItems:"center",gap:8}},
    h("div",{style:{
      width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:12,fontWeight:700,fontFamily:"monospace",
      background:done?"var(--accent)":active?"var(--accent-lt)":"#f3f4f6",
      color:done?"#fff":active?"var(--accent)":"var(--text-3)",
      border:active?"2px solid var(--accent)":done?"2px solid var(--accent)":"2px solid var(--border)",
      transition:"all 0.2s",
    }},done?"✓":number),
    h("span",{style:{fontSize:13,fontWeight:active?600:400,color:active?"var(--text-1)":"var(--text-3)",transition:"color 0.2s"}},label)
  );
}

function App(){
  const[step,setStep]=useState(1),[briefData,setBriefData]=useState(null),[formValues,setFormValues]=useState({}),[qaResults,setQaResults]=useState({}),[manualStatus,setManualStatus]=useState({}),[comments,setComments]=useState({}),[qaRun,setQaRun]=useState(false),[dragging,setDragging]=useState(false),[fileName,setFileName]=useState(""),[diffMap,setDiffMap]=useState({});
  const fileRef=useRef();

  const parseExcel=useCallback((file)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      const data=new Uint8Array(e.target.result),wb=XLSX.read(data,{type:"array"}),ws=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      const ex={};rows.forEach(row=>{if(row.length>=2&&row[0])ex[row[0].toString().trim()]=(row[1]??"").toString().trim();});
      if(!Object.keys(ex).length){const j=XLSX.utils.sheet_to_json(ws,{defval:""});if(j.length)Object.assign(ex,j[0]);}
      setBriefData(Object.keys(ex).length?ex:DEMO_DATA);setStep(2);
    };reader.readAsArrayBuffer(file);
  },[]);

  const handleFile=(file)=>{if(!file)return;setFileName(file.name);parseExcel(file);};
  const runQA=()=>{
    const results={},diffs={};
    QA_FIELDS.forEach(({key})=>{const exp=briefData?.[key]??"",act=formValues[key]??"";results[key]=manualStatus[key]||compare(exp,act);if(results[key]==="fail")diffs[key]=computeDiff(exp,act);});
    setQaResults(results);setDiffMap(diffs);setQaRun(true);setStep(3);
  };
  const toggleStatus=(key)=>{
    const cycle=["pass","fail","review"],next=cycle[(cycle.indexOf(qaResults[key]||"pass")+1)%3];
    setQaResults(p=>({...p,[key]:next}));setManualStatus(p=>({...p,[key]:next}));
    if(next==="fail")setDiffMap(p=>({...p,[key]:computeDiff(briefData?.[key]??"",formValues[key]??"")}));
  };

  const vals=Object.values(qaResults);
  const passCount=vals.filter(s=>s==="pass").length,failCount=vals.filter(s=>s==="fail").length,reviewCount=vals.filter(s=>s==="review").length;
  const total=QA_FIELDS.length,score=total?Math.round((passCount/total)*100):0;
  const scoreColor=score>=80?"var(--pass-text)":score>=50?"var(--review-text)":"var(--fail-text)";
  const scoreBg=score>=80?"var(--pass-bg)":score>=50?"var(--review-bg)":"var(--fail-bg)";
  const reset=()=>{setStep(1);setBriefData(null);setFormValues({});setQaResults({});setManualStatus({});setComments({});setDiffMap({});setQaRun(false);};
  const exportReport=()=>{
    const lines=["AdOps Campaign QA Report",`Brief: ${fileName}`,`Date: ${new Date().toLocaleDateString()}`,`Score: ${score}% (${passCount}/${total} passed)`,"",
      ...QA_FIELDS.map(({key,label})=>`[${(qaResults[key]||"pending").toUpperCase()}] ${label}: Expected="${briefData?.[key]||""}" Actual="${formValues[key]||""}"${comments[key]?` | Note: ${comments[key]}`:""}`)
    ].join("\n");
    const url=URL.createObjectURL(new Blob([lines],{type:"text/plain"}));const a=document.createElement("a");a.href=url;a.download="qa_report.txt";a.click();URL.revokeObjectURL(url);
  };

  const inputStyle={width:"100%",padding:"8px 11px",borderRadius:7,border:"1.5px solid var(--border)",fontSize:13,fontFamily:"'IBM Plex Mono',monospace",background:"var(--bg-input)",color:"var(--text-1)"};

  return h("div",{style:{minHeight:"100vh",background:"var(--bg-base)",color:"var(--text-1)",fontFamily:"'Inter','Segoe UI',sans-serif"}},

    // ── Header ──
    h("div",{style:{background:"var(--bg-surface)",borderBottom:"1.5px solid var(--border)",padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:16,height:62,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},
        h("div",{style:{width:36,height:36,background:"var(--accent)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:"#fff",fontFamily:"monospace",flexShrink:0,letterSpacing:"0.02em"}},"QA"),
        h("div",{style:{fontWeight:700,fontSize:15,color:"var(--text-1)",letterSpacing:"-0.01em"}},"AdOps QA Assistant")
      ),
      h("div",{style:{display:"flex",alignItems:"center",gap:18,flexWrap:"wrap"}},
        h(Step,{number:1,label:"Data Ingestion",active:step===1,done:step>1}),
        h("div",{style:{width:32,height:1,background:"var(--border)"}}),
        h(Step,{number:2,label:"Platform Data",active:step===2,done:step>2}),
        h("div",{style:{width:32,height:1,background:"var(--border)"}}),
        h(Step,{number:3,label:"QA Results",active:step===3,done:false})
      )
    ),

    h("div",{style:{maxWidth:1120,margin:"0 auto",padding:"32px 24px"}},

      // ── STEP 1: Data Ingestion ──
      step===1&&h("div",{className:"fade-in",style:{display:"flex",flexDirection:"column",alignItems:"center",gap:24}},
        h("div",{style:{textAlign:"center",marginTop:8}},
          h("h1",{style:{fontSize:24,fontWeight:700,margin:"0 0 0",color:"var(--text-1)",letterSpacing:"-0.02em"}},"Upload CAF/JT")
        ),
        h("div",{
          onDragOver:e=>{e.preventDefault();setDragging(true);},
          onDragLeave:()=>setDragging(false),
          onDrop:e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);},
          onClick:()=>fileRef.current.click(),
          style:{width:"100%",maxWidth:520,border:`2px dashed ${dragging?"var(--accent)":"var(--border)"}`,borderRadius:14,padding:"52px 32px",textAlign:"center",cursor:"pointer",background:dragging?"var(--accent-dim)":"var(--bg-surface)",transition:"all 0.2s",boxShadow:dragging?"0 0 0 4px var(--accent-dim)":"none"}
        },
          h("input",{ref:fileRef,type:"file",accept:".xlsx,.xls",style:{display:"none"},onChange:e=>handleFile(e.target.files[0])}),
          h("div",{style:{width:52,height:52,background:"var(--accent-lt)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:24}},"📂"),
          h("div",{style:{fontWeight:600,fontSize:15,marginBottom:6,color:"var(--text-1)"}},"Drop your file here"),
          h("div",{style:{color:"var(--text-4)",fontSize:13}},"Supports .xlsx and .xls")
        ),
        h("div",{style:{color:"var(--text-4)",fontSize:12}},"— or —"),
        h("button",{
          onClick:()=>{setBriefData(DEMO_DATA);setFileName("demo_caf.xlsx");setStep(2);},
          style:{padding:"10px 28px",borderRadius:8,border:"1.5px solid var(--accent)",background:"var(--accent-lt)",fontWeight:600,fontSize:13,color:"var(--accent)",letterSpacing:"0.01em",transition:"all 0.15s"}
        },"Use Demo Data"),
        h("div",{style:{background:"var(--bg-surface)",border:"1.5px solid var(--border)",borderRadius:12,padding:"20px 24px",width:"100%",maxWidth:520,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}},
          h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--text-3)",marginBottom:14}},"Expected Fields"),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px 24px"}},
            ...QA_FIELDS.map(f=>h("div",{key:f.key,style:{fontSize:13,color:"var(--text-2)",display:"flex",alignItems:"center",gap:8}},
              h("span",{style:{width:6,height:6,borderRadius:"50%",background:"var(--accent)",display:"inline-block",flexShrink:0}}),f.label
            ))
          )
        )
      ),

      // ── STEP 2: Platform Data ──
      step===2&&h("div",{className:"fade-in",style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}},

        // CAF/JT Details
        h("div",null,
          h("div",{className:"card",style:{boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
            h("div",{style:{background:"var(--bg-raised)",padding:"14px 20px",display:"flex",alignItems:"center",gap:10,borderBottom:"1.5px solid var(--border)"}},
              h("span",{className:"label-caps"},"CAF/JT Details"),
              h("span",{style:{marginLeft:"auto",fontSize:11,color:"var(--text-4)",fontFamily:"monospace",fontWeight:500}},fileName)
            ),
            h("div",null,
              ...QA_FIELDS.map(({key,label},idx)=>h("div",{key,style:{display:"flex",padding:"11px 20px",borderBottom:idx<QA_FIELDS.length-1?"1px solid var(--border-soft)":"none",alignItems:"flex-start",gap:12}},
                h("div",{style:{fontSize:12,color:"var(--text-3)",minWidth:130,paddingTop:2,flexShrink:0,fontWeight:500}},label),
                h("div",{style:{fontSize:13,fontFamily:"'IBM Plex Mono',monospace",fontWeight:500,color:briefData?.[key]?"var(--text-1)":"var(--text-4)",wordBreak:"break-word"}},briefData?.[key]||"—")
              ))
            )
          ),
          h("div",{style:{marginTop:8,fontSize:11,color:"var(--text-4)",textAlign:"center"}})
        ),

        // UI Details
        h("div",null,
          h("div",{className:"card",style:{boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
            h("div",{style:{background:"var(--bg-raised)",padding:"14px 20px",borderBottom:"1.5px solid var(--border)"}},
              h("span",{className:"label-caps"},"UI Details")
            ),
            h("div",{style:{padding:"18px 20px",display:"flex",flexDirection:"column",gap:14}},
              ...QA_FIELDS.map(({key,label,type,options,placeholder})=>h("div",{key},
                h("label",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",color:"var(--text-3)",display:"block",marginBottom:5}},label),
                type==="select"
                  ?h("select",{value:formValues[key]||"",onChange:e=>setFormValues(p=>({...p,[key]:e.target.value})),style:inputStyle},
                    ...(options||[]).map(o=>h("option",{key:o,value:o},o||"Select…")))
                  :h("input",{type:"text",value:formValues[key]||"",placeholder:placeholder||briefData?.[key]||"",onChange:e=>setFormValues(p=>({...p,[key]:e.target.value})),style:inputStyle})
              )),
              h("div",{style:{display:"flex",gap:10,marginTop:6}},
                h("button",{
                  onClick:()=>{const pf={};QA_FIELDS.forEach(({key})=>{pf[key]=briefData?.[key]||"";});setFormValues(pf);},
                  style:{flex:1,padding:"10px 0",border:"1.5px solid var(--border)",borderRadius:8,background:"#fff",fontSize:13,fontWeight:600,color:"var(--text-2)",transition:"all 0.15s"}
                },"Auto-fill from CAF/JT"),
                h("button",{
                  onClick:runQA,
                  style:{flex:2,padding:"10px 0",border:"none",borderRadius:8,background:"var(--accent)",color:"#fff",fontSize:13,fontWeight:700,letterSpacing:"0.03em",boxShadow:"0 2px 6px rgba(46,125,82,0.3)",transition:"all 0.15s"}
                },"▶  Run QA Check")
              )
            )
          )
        )
      ),

      // ── STEP 3: QA Results ──
      step===3&&qaRun&&h("div",{className:"fade-in"},

        // Score cards
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}},
          ...[
            {label:"QA Score",    value:`${score}%`, sub:`${passCount} of ${total} passed`, color:scoreColor, bg:scoreBg},
            {label:"Passed",      value:passCount,   sub:"fields verified",                  color:"var(--pass-text)",   bg:"var(--pass-bg)"},
            {label:"Failed",      value:failCount,   sub:"fields mismatched",                color:"var(--fail-text)",   bg:"var(--fail-bg)"},
            {label:"Needs Review",value:reviewCount, sub:"manually flagged",                 color:"var(--review-text)", bg:"var(--review-bg)"},
          ].map(({label,value,sub,color,bg})=>h("div",{key:label,style:{background:"var(--bg-surface)",border:"1.5px solid var(--border)",borderRadius:12,padding:"16px 20px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}},
            h("div",{style:{fontSize:10,fontWeight:700,letterSpacing:"0.09em",textTransform:"uppercase",color:"var(--text-3)",marginBottom:8}},label),
            h("div",{style:{fontSize:30,fontWeight:700,color,fontFamily:"'IBM Plex Mono',monospace",lineHeight:1}},value),
            h("div",{style:{fontSize:12,color:"var(--text-3)",marginTop:5}},sub)
          ))
        ),

        // Progress bar
        h("div",{style:{background:"var(--bg-surface)",border:"1.5px solid var(--border)",borderRadius:12,padding:"16px 20px",marginBottom:22,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,color:"var(--text-2)",marginBottom:9}},
            h("span",{style:{fontWeight:500}},"QA Completion"),
            h("span",{style:{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,color:"var(--text-1)"}},`${score}%`)
          ),
          h("div",{style:{height:7,background:"var(--bg-base)",borderRadius:4,overflow:"hidden",border:"1px solid var(--border-soft)"}},
            h("div",{style:{height:"100%",width:`${score}%`,background:score>=80?"var(--pass-dot)":score>=50?"var(--review-dot)":"var(--fail-dot)",borderRadius:4,transition:"width 0.6s ease"}})
          ),
          h("div",{style:{display:"flex",gap:20,marginTop:12,fontSize:12}},
            ...[["var(--pass-dot)","Pass"],["var(--fail-dot)","Fail"],["var(--review-dot)","Review"],["var(--pending-dot)","Pending"]].map(([c,l])=>
              h("div",{key:l,style:{display:"flex",alignItems:"center",gap:5}},
                h("div",{style:{width:8,height:8,borderRadius:"50%",background:c}}),
                h("span",{style:{color:"var(--text-3)",fontWeight:500}},l)
              )
            )
          )
        ),

        failCount>0&&h(DiffLegend),

        // Checklist
        h("div",{className:"card",style:{boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
          h("div",{style:{background:"var(--bg-raised)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1.5px solid var(--border)"}},
            h("div",{style:{display:"flex",alignItems:"center",gap:10}},
              h("span",{className:"label-caps"},"QA Checklist"),
              failCount>0&&h("span",{style:{fontSize:11,color:"var(--fail-text)",background:"var(--fail-bg)",border:"1px solid var(--fail-border)",borderRadius:10,padding:"2px 11px",fontWeight:600}},`${failCount} mismatch${failCount>1?"es":""} · diff active`)
            ),
            h("div",{style:{display:"flex",gap:8}},
              h("button",{onClick:()=>{setStep(2);setQaRun(false);},style:{padding:"6px 14px",border:"1.5px solid var(--border)",borderRadius:7,background:"#fff",color:"var(--text-2)",fontSize:12,fontWeight:500}},"← Edit"),
              h("button",{onClick:reset,style:{padding:"6px 14px",border:"1.5px solid var(--accent)",borderRadius:7,background:"var(--accent-lt)",color:"var(--accent)",fontSize:12,fontWeight:600}},"New Brief")
            )
          ),

          // Column headers
          h("div",{style:{display:"grid",gridTemplateColumns:"155px 1fr 1fr 115px 75px",padding:"9px 20px",borderBottom:"1px solid var(--border-soft)",background:"#f9fafc"}},
            ...["Field","Expected (CAF/JT)","Actual (UI)","Status","Actions"].map(col=>
              h("div",{key:col,style:{fontSize:10,fontWeight:700,letterSpacing:"0.09em",textTransform:"uppercase",color:"var(--text-3)"}},col)
            )
          ),

          // Rows
          ...QA_FIELDS.map(({key,label},idx)=>{
            const expected=briefData?.[key]??"—",actual=formValues[key]??"",status=qaResults[key]||"pending",cfg=SC[status],diff=diffMap[key],isFail=status==="fail"&&diff;
            return h("div",{key,style:{borderBottom:idx<QA_FIELDS.length-1?"1px solid var(--border-soft)":"none"}},
              h("div",{style:{display:"grid",gridTemplateColumns:"155px 1fr 1fr 115px 75px",padding:"12px 20px",alignItems:"start"}},
                h("div",{style:{fontSize:13,fontWeight:600,color:"var(--text-2)",paddingTop:3}},label),
                // Expected
                h("div",{style:{fontSize:12,fontFamily:"'IBM Plex Mono',monospace",
                  background:isFail?"#fef9c3":"#f0faf5",
                  border:isFail?"1.5px solid #fde68a":"1.5px solid #c6e8d5",
                  padding:"5px 9px",borderRadius:6,marginRight:10,wordBreak:"break-word",lineHeight:1.8,color:"var(--text-1)"}},
                  isFail?h(DiffExpected,{diff}):h("span",null,expected)
                ),
                // Actual
                h("div",{style:{fontSize:12,fontFamily:"'IBM Plex Mono',monospace",
                  color:actual?"var(--text-1)":"var(--text-4)",
                  background:isFail?"var(--fail-bg)":actual?"#f5f8ff":"var(--bg-raised)",
                  border:isFail?"1.5px solid var(--fail-border)":actual?"1.5px solid #dce5f8":"1.5px solid var(--border-soft)",
                  padding:"5px 9px",borderRadius:6,marginRight:10,wordBreak:"break-word",lineHeight:1.8}},
                  isFail?h(DiffActual,{diff}):h("span",null,actual||"—")
                ),
                // Status badge
                h("div",null,
                  h("div",{style:{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 11px",borderRadius:20,border:`1.5px solid ${cfg.border}`,background:cfg.bg}},
                    h("div",{style:{width:7,height:7,borderRadius:"50%",background:cfg.dot,flexShrink:0}}),
                    h("span",{style:{fontSize:10,fontWeight:700,color:cfg.text,fontFamily:"monospace",letterSpacing:"0.06em"}},cfg.label)
                  )
                ),
                // Toggle
                h("button",{onClick:()=>toggleStatus(key),title:"Cycle: Pass → Fail → Review",
                  style:{padding:"5px 10px",border:"1.5px solid var(--border)",borderRadius:6,background:"#fff",fontSize:12,color:"var(--text-2)",fontWeight:500}
                },"⟳")
              ),
              h("div",{style:{padding:"0 20px 12px 175px"}},
                h("input",{type:"text",placeholder:"Add QA comment…",value:comments[key]||"",
                  onChange:e=>setComments(p=>({...p,[key]:e.target.value})),
                  style:{...inputStyle,fontSize:12,color:"var(--text-2)",padding:"6px 10px"}
                })
              )
            );
          }),

          // Footer
          h("div",{style:{padding:"14px 20px",background:"#f9fafc",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",borderTop:"1.5px solid var(--border)"}},
            h("div",{style:{fontSize:13,color:"var(--text-2)"}},
              failCount>0&&h("span",{style:{color:"var(--fail-text)",fontWeight:600}},`⚠ ${failCount} field${failCount>1?"s":""} need correction · `),
              reviewCount>0&&h("span",{style:{color:"var(--review-text)",fontWeight:600}},`${reviewCount} flagged for review · `),
              passCount===total&&h("span",{style:{color:"var(--pass-text)",fontWeight:600}},"✓ All fields verified · "),
              "QA complete"
            ),
            h("button",{onClick:exportReport,
              style:{marginLeft:"auto",padding:"9px 20px",border:"none",borderRadius:8,background:"var(--accent)",color:"#fff",fontSize:13,fontWeight:700,boxShadow:"0 2px 6px rgba(46,125,82,0.25)",letterSpacing:"0.01em"}
            },"Export QA Report")
          )
        )
      )
    ),

    // Footer
    h("div",{style:{textAlign:"center",padding:"20px",fontSize:11,color:"var(--text-4)",borderTop:"1px solid var(--border-soft)",marginTop:40,background:"var(--bg-surface)"}},"AdOps QA Assistant · MVP")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
